# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# pylint needs to be run in the local venv (vs pre-commit's generated) so imports work
# - should be installed via `pip install -r requirements-dev.txt`

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
# deptry must run in the local venv (vs pre-commit's isolated env) so it can read
# installed package metadata to map package names to modules (e.g. pyyaml -> yaml).
# Otherwise it reports false missing/unused dependency errors.
- repo: local
  hooks:
    - id: deptry
      name: deptry
      entry: poetry run deptry .
      language: system
      pass_filenames: false
      always_run: true
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.12.2
  hooks:
    # Run the linter.
    - id: ruff
      args: ["check", "--select", "I", "--fix"]
    # Run the formatter.
    - id: ruff-format
